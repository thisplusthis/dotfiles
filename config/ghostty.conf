# Mirrors your Kitty layering (same end state as Kitty, no edits under ~/.config/kitty):
#   1) kitty-themes/themes/grape.conf
#   2) current-theme.conf inside BEGIN_KITTY_THEME ("Atelier Seaside Dark"; wins on overlaps)
# Fonts/settings taken from kitty.conf order of includes (theme does not redefine fonts).

font-family = Mononoki Nerd Font
font-size = 13

# Merged foreground/background/cursor/selection (current-theme overrides grape)
background = #13141a
foreground = #8ca68c

selection-foreground = #8ca68c
selection-background = #242924

cursor-color = #8ca68c
cursor-text = #131513

# Kitty builtin dim curve uses 0.4 unless you uncomment dim_opacity; Ghostty: faint-opacity
faint-opacity = 0.4

palette-generate = true

# ANSI 16 = merged palette (matches current-theme after grape underneath)
palette = 0=#131513
palette = 1=#e6193c
palette = 2=#29a329
palette = 3=#98981b
palette = 4=#3d62f5
palette = 5=#ad2bee
palette = 6=#1999b3
palette = 7=#8ca68c
palette = 8=#687d68
palette = 9=#87711d
palette = 10=#242924
palette = 11=#5e6e5e
palette = 12=#809980
palette = 13=#cfe8cf
palette = 14=#e619c3
palette = 15=#f4fbf4

# From current-theme: macos_titlebar_*, active_border_color vs Ghostty equivalents
window-titlebar-background = #242924
window-titlebar-foreground = #cfe8cf
split-divider-color = #687d68
