# Prefix: Ctrl-a (GNU screen style). Sending Ctrl-a twice passes through to programs (e.g. nested tmux).
set -g prefix C-s
unbind C-b
bind C-s send-prefix

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Scrollback — send wheel/trackpad to tmux so you scroll pane history here
set -g mouse on

# How many lines tmux remembers per pane (default 2000)
set -g history-limit 50000

# Editor-friendly: no Escape delay stacking with Vim/Neovim nested in tmux
set -sg escape-time 0

# Neovim/Vim FocusGained / autoread and similar behave when switching tmux windows
set -g focus-events on

# Number windows/panes from 1; collapse gaps when something closes
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g set-titles on

# Copy mode: hjkl navigation, vim-ish search (/ ?)
setw -g mode-keys vi

# Reload config — prefix r (capital R restores stock refresh-client)
bind r source-file ~/.config/tmux/tmux.conf \; display-message '~/.config/tmux/tmux.conf reloaded'
bind R refresh-client

# Splits: | left/right, - top/bottom (same cwd — replaces prefix - meaning delete-buffer)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Resize: prefix then Ctrl+h/j/k/l (repeatable; keeps prefix L → last session)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# vim style pane jumping
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# change
bind -n M-Left previous-window
bind -n M-Right next-window

# Status bar position — top of window
set -g status-position top
set -g status-left-length 100
set -g status-right-length 500

# Dracula theme (options must be set before tpm initializes plugins)
set -g @dracula-plugins "continuum cpu-usage battery time"
set -g @dracula-show-powerline true
set -g @dracula-show-flags true
set -g @dracula-show-left-icon "#S"
set -g @dracula-refresh-rate 5
set -g @dracula-show-timezone false
set -g @dracula-time-format "🕐 %H:%M"
set -g @dracula-continuum-label "◉ "
# Dracula widget prefixes (Unicode where noted;  needs Nerd Font)
set -g @dracula-cpu-usage-label "⛭"
set -g @dracula-battery-label "⚡"
set -g @dracula-no-battery-label " "

set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'laktak/extrakto'

# Initialize TMUX plugin manager (keep this line at the very bottom)
# TPM auto-detects ~/.config/tmux/plugins/ when tmux.conf is at XDG path
run '~/.config/tmux/plugins/tpm/tpm'

# Dracula shortens status-right-length; keep room for widgets
set -g status-right-length 500
